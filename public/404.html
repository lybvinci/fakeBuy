<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=/fakeBuy/" />
    <title>fakeBuy</title>
    <script>
      // SPA fallback for GitHub Pages：
      // 把当前的 pathname/search 编码后转给 index.html，由它解码并替换路由。
      (function () {
        var segmentCount = 1; // /<repo>/  -> 第一段是仓库名
        var l = window.location;
        l.replace(
          l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
            l.pathname.split("/").slice(0, 1 + segmentCount).join("/") + "/?/" +
            l.pathname.slice(1).split("/").slice(segmentCount).join("/").replace(/&/g, "~and~") +
            (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
            l.hash
        );
      })();
    </script>
  </head>
  <body></body>
</html>
